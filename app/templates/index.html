{% extends 'base.html' %}
{% block title %}Inicio · Gemini Chunking{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Cargar archivo de texto</h1>
          {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
          {% endif %}
          <form action="{{ url_for('main.process') }}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
            <div class="mb-3">
              <label for="file" class="form-label">Archivo (.txt)</label>
              <input class="form-control" type="file" id="file" name="file" accept=".txt" required />
              <div class="form-text">Tamaño máximo según configuración del servidor.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Estrategia de chunking</label>
              <select class="form-select" name="strategy" id="strategy">
                <option value="paragraphs" selected>Por párrafos (con límite de caracteres)</option>
                <option value="characters">Por tamaño fijo de caracteres (con solapamiento)</option>
              </select>
            </div>

            <div id="params-paragraphs" class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="max_chars" class="form-label">Máx. caracteres por chunk</label>
                <input type="number" class="form-control" id="max_chars" name="max_chars" value="1200" min="300" max="4000" />
              </div>
            </div>

            <div id="params-characters" class="row g-3 mb-3 d-none">
              <div class="col-md-6">
                <label for="chunk_size" class="form-label">Tamaño de chunk (caracteres)</label>
                <input type="number" class="form-control" id="chunk_size" name="chunk_size" value="1000" min="200" max="4000" />
              </div>
              <div class="col-md-6">
                <label for="overlap" class="form-label">Solapamiento</label>
                <input type="number" class="form-control" id="overlap" name="overlap" value="120" min="0" max="3999" />
              </div>
            </div>

            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">Procesar con Gemini</button>
              <button class="btn btn-outline-secondary" type="reset">Limpiar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
